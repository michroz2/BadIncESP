[platformio]
; Временно делаем новую плату дефолтной для сборки и прошивки
default_envs = esp32-wroom

[env:esp32-s3-zero]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.partitions = default.csv
build_flags = 
	-D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps = 
	fastled/FastLED @ ^3.6.0

[env:esp32-wroom]
platform = espressif32
; Стандартный профиль для NodeMCU ESP32 DEVKIT V1
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
lib_deps = 
	fastled/FastLED @ ^3.6.0